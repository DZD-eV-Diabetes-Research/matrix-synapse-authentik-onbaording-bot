name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · type · test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # so the auto-format step can push the fix commit back
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR's source branch (not the detached merge ref) so an
          # auto-format commit can be pushed back to it. Empty on push events,
          # where checkout falls back to the pushed ref — also correct.
          ref: ${{ github.head_ref }}

      - name: Set up PDM (Python 3.14)
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.14"
          cache: true

      - name: Install dependencies
        run: pdm install --dev

      - name: Ruff lint
        run: pdm run ruff check .

      # Formatting is mechanical, so we auto-apply it instead of failing the build.
      # If ruff changed anything, the next step commits it back to the branch.
      - name: Ruff format
        run: pdm run ruff format .

      - name: Commit formatting fixes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with ruff"

      - name: Mypy
        run: pdm run mypy onbot

      - name: Config docs in sync with the model
        run: pdm run check-config-docs

      - name: Pytest (unit + contract — fast, coverage reported but not gated)
        run: pdm run pytest -m "not integration" --cov --cov-report=term-missing --cov-fail-under=0

  integration:
    name: integration (live Synapse · MAS · Authentik)
    runs-on: ubuntu-latest
    # Slow (boots a 6-container stack) and needs Docker — kept separate from the fast quality job.
    steps:
      - uses: actions/checkout@v4

      - name: Set up PDM (Python 3.14)
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.14"
          cache: true

      - name: Install dependencies
        run: pdm install --dev

      # The full suite (incl. integration) — the testcontainers fixture brings up the stack. This is
      # the authoritative coverage gate: app.py + __main__.py are exercised end-to-end here.
      - name: Pytest (full suite + coverage gate)
        run: pdm run pytest --cov --cov-report=term-missing
