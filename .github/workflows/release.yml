name: Release

# Build and publish the Docker image to GHCR on a semver tag.
#
# Version / tag flow (see CHANGELOG.md):
#   1. Update CHANGELOG.md: move "Unreleased" entries under a new `## [X.Y.Z] - DATE` heading.
#   2. Bump `version` in pyproject.toml and `__version__` in onbot/__init__.py to X.Y.Z.
#   3. Tag and push:  git tag vX.Y.Z && git push origin vX.Y.Z
#   4. This workflow builds and pushes ghcr.io/<owner>/<repo> with tags derived from the git tag
#      (X.Y.Z, X.Y, X, and `latest` for non-prerelease tags) plus OCI labels + build provenance.
#
# Kept separate from ci.yml (quality + integration) on purpose — releasing is its own concern.
#
# ⚠️ The Phase 1 security hand-off (rotate leaked credentials + scrub git history, BATTLE_PLAN §5)
#    must be complete before the first real tag is pushed. See README.md.

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish-image:
    name: build & push image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # for build provenance attestation
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          # `latest` only for proper (non-prerelease) releases.
          flavor: |
            latest=auto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
