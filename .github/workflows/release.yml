name: Release

# Build & publish artifacts when a GitHub Release is published.
#
# Two channels, driven by the release's "This is a pre-release" checkbox
# (github.event.release.prerelease), mirroring the DZDMedLog pipeline:
#
#   • Pre-release  → DockerHub image tagged `beta` + the version (e.g. 1.2.0-beta.1)
#                    → PyPI upload of the (PEP 440 pre-release) version
#   • Full release → DockerHub image tagged `latest` + version, major.minor, major
#                    → PyPI upload of the stable version
#
# On PyPI the beta/latest distinction is intrinsic to the version string: a
# PEP 440 pre-release (1.2.0b1, 1.2.0rc1, …) is not installed by `pip install`
# unless `--pre` is passed, so it behaves like the `beta` container tag.
#
# The package version is derived from the git tag (pdm-backend SCM, see pyproject.toml) — there is
# NO version to hand-edit. The tag is the single source of truth: PyPI builds it from the checked-out
# tag; the Docker image gets it passed in via PDM_BUILD_SCM_VERSION (its build context has no .git).
#
# Version / tag flow (see CHANGELOG.md):
#   1. Update CHANGELOG.md: move "Unreleased" entries under `## [X.Y.Z] - DATE`.
#   2. Push a PEP 440 tag (a pre-release like 1.2.0b1 for betas, e.g. 1.2.0 for a full release)
#      and create a GitHub Release from it — tick "pre-release" for a beta, leave it unticked
#      for a stable release. The tick drives the container beta/latest tag; the tag string drives
#      the published version everywhere.
#
# Secrets: DockerHub uses the org-wide DOCKERHUB_DZD_USERNAME / DOCKERHUB_DZD_PASSWORD;
# PyPI uses the org-wide PYPI_API_TOKEN. Kept separate from ci.yml (quality +
# integration) on purpose.
#
# ⚠️ The Phase 1 security hand-off (rotate leaked credentials + scrub git history,
#    BATTLE_PLAN §5) must be complete before the first real release. See README.md.

on:
  release:
    types: [published]

env:
  IMAGE_NAME: dzdde/onbot

jobs:
  publish-image:
    name: build & push image (DockerHub)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for build provenance attestation
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_DZD_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DZD_PASSWORD }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # Pre-releases get `beta` + the full version only; full releases get the
          # full version plus the rolling major.minor / major tags and `latest`.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !github.event.release.prerelease }}
            type=semver,pattern={{major}},enable=${{ !github.event.release.prerelease }}
            type=raw,value=beta,enable=${{ github.event.release.prerelease }}
          flavor: |
            latest=${{ !github.event.release.prerelease }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Feed the release version into pdm-backend inside the image (no .git in the build context).
          build-args: |
            PDM_BUILD_SCM_VERSION=${{ steps.meta.outputs.version }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-pypi:
    name: build & publish (PyPI)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for PyPI trusted publishing / provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need the full tag history so pdm-backend can derive the version from SCM

      - name: Set up PDM (Python 3.14)
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.14"
          cache: true

      - name: Build sdist + wheel
        run: pdm build

      # Version comes from the git tag (dynamic SCM). A pre-release tag (1.2.0b1) is uploaded as a
      # PEP 440 pre-release, so pip treats it as beta (opt-in via --pre). skip-existing keeps a re-run
      # from hard-failing if a file for this version is already on PyPI.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
