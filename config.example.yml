# Onbot configuration template — GENERATED from onbot/config.py.
# Regenerate with `./gen_config_docs.sh`; do not edit by hand.
# Copy this to config.yml and fill in the required (Required: True) values. Every setting can
# also be supplied via its ONBOT_* environment variable (shown per field below).


# ## log_level - Logging verbosity ###
# Type:         Enum
# Required:     False
# Default:      "INFO"
# Allowed vals: ['INFO', 'DEBUG']
# Env-var:      'ONBOT_LOG_LEVEL'
# Description:  How much the bot logs. `DEBUG` is noisy — it includes every API call it makes — but
#               it is the fastest way to see why a user or group is not being picked up while wiring
#               the bot up. The `--log-level` command-line flag overrides this.
log_level: INFO

# ## server_tick_rate_sec - Reconcile interval (seconds) ###
# Type:        int
# Required:    False
# Default:     300
# Env-var:     'ONBOT_SERVER_TICK_RATE_SEC'
# Description: How often, in seconds, the bot re-converges Authentik state onto Matrix. A
#              reconcile reads the whole Matrix side — every managed room's members, power levels
#              and state — so it is the expensive operation, and this is the interval that costs
#              Synapse traffic.
#
#              It does not set how quickly new users are onboarded. A reconcile also runs on demand
#              whenever `authentik_poll_rate_sec` notices Authentik has changed, so this is a safety
#              net that repairs drift somebody caused *inside* Matrix (a manually kicked member, an
#              edited power level). Minutes, not seconds, is the right order of magnitude.
# Example No. 1:
#  >server_tick_rate_sec: 300
# Example No. 2:
#  >server_tick_rate_sec: 900
server_tick_rate_sec: 300

# ## authentik_poll_rate_sec - Authentik poll interval (seconds) ###
# Type:        int
# Required:    False
# Default:     15
# Env-var:     'ONBOT_AUTHENTIK_POLL_RATE_SEC'
# Description: How often, in seconds, the bot asks Authentik whether anything changed — a new
#              user, a group membership, a renamed room group. When something did, it runs a
#              reconcile immediately; when nothing did, it does nothing at all.
#
#              This is what sets onboarding latency, and it is cheap: two Authentik requests per
#              poll and zero against Synapse. Set it to `0` to disable the poll entirely, in which
#              case new users wait for the next `server_tick_rate_sec` reconcile.
# Example No. 1:
#  >authentik_poll_rate_sec: 15
# Example No. 2:
#  >authentik_poll_rate_sec: 60
# Example No. 3:
#  >authentik_poll_rate_sec: 0
authentik_poll_rate_sec: 15

# ## synapse_server - Synapse server ###
# Type:        Object (SynapseServer)
# Required:    True
# Env-var:     'ONBOT_SYNAPSE_SERVER'
# Description: Connection data and credentials for the Matrix client-server and Synapse admin
#              APIs. Authenticate with either `bot_access_token` or `oauth2`, not both.
synapse_server:

  # ## server_name - Matrix server name ###
  # YAML-path:   synapse_server.server_name
  # Type:        str
  # Required:    True
  # Env-var:     'ONBOT_SYNAPSE_SERVER__SERVER_NAME'
  # Description: Synapse's public facing domain — the part after the colon in a Matrix ID such as
  #              `@alice:company.org`. This is not necessarily the domain under which the Synapse
  #              server is reachable; that is `server_url`. See
  #              https://element-hq.github.io/synapse/latest/usage/configuration/config_documentation.html#server_name
  # Example:
  #  >server_name: company.org
  server_name: ''

  # ## server_url - Synapse base URL ###
  # YAML-path:   synapse_server.server_url
  # Type:        str
  # Required:    True
  # Env-var:     'ONBOT_SYNAPSE_SERVER__SERVER_URL'
  # Description: URL the bot uses to reach the Synapse server. This can (and should) be an internal
  #              URL, so the Synapse admin API need not be exposed publicly. A public URL works too.
  # Example No. 1:
  #  >server_url: https://internal.matrix
  # Example No. 2:
  #  >server_url: https://matrix.company.org
  server_url: ''

  # ## bot_user_id - Bot Matrix ID ###
  # YAML-path:   synapse_server.bot_user_id
  # Type:        str
  # Required:    True
  # Env-var:     'ONBOT_SYNAPSE_SERVER__BOT_USER_ID'
  # Description: Full Matrix user ID of an existing account; the bot acts as this user. The account
  #              must already exist — the bot does not register itself — and its localpart must be on
  #              `server_name`.
  # Example:
  #  >bot_user_id: '@welcome-bot:company.org'
  bot_user_id: ''

  # ## bot_access_token - Bot access token ###
  # YAML-path:   synapse_server.bot_access_token
  # Type:        str
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_SYNAPSE_SERVER__BOT_ACCESS_TOKEN'
  # Description: Access token authorising the bot against the Synapse APIs. On a homeserver fronted
  #              by the Matrix Authentication Service this is a compatibility token, issued with
  #              `mas-cli manage issue-compatibility-token`. Provide the bare token; do not prefix it
  #              with `Bearer` (the client adds that). Leave unset (`null`) when using `oauth2`
  #              instead. Prefer supplying it through the
  #              `ONBOT_SYNAPSE_SERVER__BOT_ACCESS_TOKEN` environment variable rather than committing
  #              it to the config file.
  # Example:
  #  >bot_access_token: syt_ONLY_AN_EXAMPLE_TOKEN_sadaw4
  bot_access_token:

  # ## oauth2 - OAuth2 authentication (alternative to the access token) ###
  # YAML-path:   synapse_server.oauth2
  # Type:        Object (MatrixOAuth2)
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_SYNAPSE_SERVER__OAUTH2'
  # Description: Authenticate as an OAuth2 client of the Matrix Authentication Service instead of
  #              carrying a static token. When set, this is used in place of `bot_access_token` and
  #              the short-lived tokens it mints refresh automatically. Provide exactly one of
  #              `bot_access_token` or `oauth2`.
  oauth2:

  # ## bot_avatar_url - Bot avatar ###
  # YAML-path:   synapse_server.bot_avatar_url
  # Type:        str
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_SYNAPSE_SERVER__BOT_AVATAR_URL'
  # Description: HTTP(S) URL to a picture the bot sets as its own avatar on start. The image is
  #              downloaded and re-uploaded to the homeserver's media repository, and only re-uploaded
  #              when the URL changes. `null` leaves the bot's current avatar untouched.
  # Example:
  #  >bot_avatar_url: https://sillyimages.com/face.png
  bot_avatar_url:

  # ## admin_api_path - Synapse admin API sub-path ###
  # YAML-path:   synapse_server.admin_api_path
  # Type:        str
  # Required:    False
  # Default:     "_synapse/admin/"
  # Env-var:     'ONBOT_SYNAPSE_SERVER__ADMIN_API_PATH'
  # Description: Sub-path the Synapse admin API is served under, relative to `server_url`. Only
  #              needs changing if a reverse proxy remounts the admin API. Keep the default if
  #              unsure.
  # Example:
  #  >admin_api_path: _synapse/admin/
  admin_api_path: _synapse/admin/

# ## authentik_server - Authentik server ###
# Type:        Object (AuthentikServer)
# Required:    True
# Env-var:     'ONBOT_AUTHENTIK_SERVER'
# Description: Connection data and API token for the upstream Authentik identity provider, which
#              the bot treats as the single source of truth for users and groups.
authentik_server:

  # ## url - Authentik base URL ###
  # YAML-path:   authentik_server.url
  # Type:        str
  # Required:    True
  # Env-var:     'ONBOT_AUTHENTIK_SERVER__URL'
  # Description: URL the bot uses to reach your Authentik server. May be an internal URL.
  # Example:
  #  >url: https://authentik.company.org/
  url: ''

  # ## api_key - Authentik API token ###
  # YAML-path:   authentik_server.api_key
  # Type:        str
  # Required:    True
  # Env-var:     'ONBOT_AUTHENTIK_SERVER__API_KEY'
  # Description: API token for your Authentik server. Generate one under
  #              `https://<authentik>/if/admin/#/core/tokens`. The token only ever needs to *read*
  #              users and groups. Provide the bare token; the client adds the `Bearer` prefix. Prefer
  #              supplying it through the `ONBOT_AUTHENTIK_SERVER__API_KEY` environment variable
  #              rather than committing it to the config file.
  # Example:
  #  >api_key: yEl4tFqeIBQwoHAd9hajmkm2PBjSAirY_THIS_IS_JUST_AN_EXAMPLE_i57e
  api_key: ''

# ## mas_admin - Matrix Authentication Service admin API ###
# Type:        Object (MasAdmin)
# Required:    False
# Default:     null
# Env-var:     'ONBOT_MAS_ADMIN'
# Description: Admin credentials for the Matrix Authentication Service. Required for the
#              offboarding module to actually revoke sessions and deactivate accounts on a
#              MAS-fronted homeserver: there the Matrix session is owned by MAS, and the Synapse
#              admin API cannot terminate it. Leave unset (`null`) on homeservers that do not use
#              MAS — the bot then enforces offboarding through the Synapse admin API alone.
mas_admin:

# ## welcome_new_users_messages - Welcome messages ###
# Type:        List of str
# Required:    False
# Env-var:     'ONBOT_WELCOME_NEW_USERS_MESSAGES'
# Description: Messages the bot sends, in order, in the 1:1 welcome direct room it opens with each
#              newly onboarded user. Each message is sent at most once per user — they are matched by
#              content, so editing a message here re-sends that one message to everyone. `null` or an
#              empty list disables the welcome direct room entirely.
# Example:
#  >welcome_new_users_messages:
#  >- Welcome aboard! I will invite you to the rooms for your groups.
welcome_new_users_messages:

  # ## List[0] ###
  # YAML-path: welcome_new_users_messages.[0]
  # Type:      str
  # Required:  False
  # Env-var:   'ONBOT_WELCOME_NEW_USERS_MESSAGES__<list-index>'
  - Welcome to the company chat. I am the company bot. I will invite you to the
    groups you are assigned to. If you have any technical questions write a
    message to @admin-person:matrix.company.org.

  # ## List[1] ###
  # YAML-path: welcome_new_users_messages.[1]
  # Type:      str
  # Required:  False
  # Env-var:   'ONBOT_WELCOME_NEW_USERS_MESSAGES__<list-index>'
  - 'If you need guidance on how to use this chat have a look at the official documentation:
    https://matrix.org/docs/chat_basics/matrix-for-im/ and https://element.io/user-guide'

  # ## List[2] ###
  # YAML-path: welcome_new_users_messages.[2]
  # Type:      str
  # Required:  False
  # Env-var:   'ONBOT_WELCOME_NEW_USERS_MESSAGES__<list-index>'
  - 🛑 🔐 The chat software will ask you to set up a 'Security Key Backup'. This
    is very important. Save the file in a secure location, otherwise you could
    lose access to older encrypted messages later. Please follow the request.

# ## onboarding_room_name - Welcome room name ###
# Type:        str
# Required:    False
# Default:     "Announcements"
# Env-var:     'ONBOT_ONBOARDING_ROOM_NAME'
# Description: Display name of the 1:1 welcome room the bot opens with each user. The room needs a
#              name because the bot joins the user directly instead of waiting for them to accept an
#              invitation, and a Matrix client only tags a room as a direct message when its user
#              accepted such an invitation — without a name the room would appear in their room list
#              as an untitled room. Only read when a room is created; renaming later does not rewrite
#              existing rooms.
# Example No. 1:
#  >onboarding_room_name: Announcements
# Example No. 2:
#  >onboarding_room_name: Company Chat Bot
onboarding_room_name: Announcements

# ## onboarding_room_topic - Welcome room topic ###
# Type:        str
# Required:    False
# Default:     "Notices from the onboarding bot. This room is read-only \u2014 you cannot write here."
# Env-var:     'ONBOT_ONBOARDING_ROOM_TOPIC'
# Description: Matrix topic (tagline) of the 1:1 welcome room. A good place to say where a user
#              should turn with questions, since they cannot ask them in this room — it is read-only.
#              Only read when a room is created.
# Example:
#  >onboarding_room_topic: Notices from the onboarding bot. You cannot write here.
onboarding_room_topic: Notices from the onboarding bot. This room is read-only —
  you cannot write here.

# ## force_join_onboarding_room - Force users into the welcome room ###
# Type:        bool
# Required:    False
# Default:     true
# Env-var:     'ONBOT_FORCE_JOIN_ONBOARDING_ROOM'
# Description: Join users into their welcome room directly, through the Synapse admin API, instead
#              of leaving them an invitation they have to accept. On by default: the room is a notice
#              board the bot posts to, so an unaccepted invitation means a user who never receives
#              the welcome messages. The join happens exactly once, when the room is created — a user
#              who then leaves the room is not dragged back in. Turn this off to send a plain
#              invitation instead; the bot also falls back to the invitation when the join fails.
force_join_onboarding_room: true

# ## admin_room - Admin control room ###
# Type:        Object (AdminRoom)
# Required:    False
# Env-var:     'ONBOT_ADMIN_ROOM'
# Description: A Matrix room in which listed administrators can command the bot — most notably
#              announcing a message to every user. Disabled by default.
admin_room:

  # ## enabled - Enable the admin control room ###
  # YAML-path:   admin_room.enabled
  # Type:        bool
  # Required:    False
  # Default:     false
  # Env-var:     'ONBOT_ADMIN_ROOM__ENABLED'
  # Description: Create and listen in a control room where administrators can command the bot. Off
  #              by default: the room lets anyone on the bot's admin allowlist send a message to every
  #              user on the server, so it should be turned on deliberately. The `onbot broadcast`
  #              command-line tool does the same job without a room.
  enabled: false

  # ## alias - Control room alias localpart ###
  # YAML-path:   admin_room.alias
  # Type:        str
  # Required:    False
  # Default:     "onbot-admin"
  # Env-var:     'ONBOT_ADMIN_ROOM__ALIAS'
  # Description: Localpart of the control room's canonical alias, i.e. the `<alias>` in
  #              `#<alias>:<server_name>`. This is how the bot finds the room again, so changing it
  #              later makes the bot create a second, empty control room rather than rename the
  #              first.
  # Example No. 1:
  #  >alias: onbot-admin
  # Example No. 2:
  #  >alias: bot-control
  alias: onbot-admin

  # ## name - Control room name ###
  # YAML-path:   admin_room.name
  # Type:        str
  # Required:    False
  # Default:     "Onbot Admin"
  # Env-var:     'ONBOT_ADMIN_ROOM__NAME'
  # Description: Display name of the control room. Only read when the room is created.
  # Example:
  #  >name: Onbot Admin
  name: Onbot Admin

  # ## topic - Control room topic ###
  # YAML-path:   admin_room.topic
  # Type:        str
  # Required:    False
  # Default:     "Onbot control room \u2014 say !help for the available commands."
  # Env-var:     'ONBOT_ADMIN_ROOM__TOPIC'
  # Description: Matrix topic (tagline) of the control room. The bot keeps this in sync with the
  #              commands it supports, so a one-line reminder is visible without scrolling.
  # Example:
  #  >topic: Bot control room. !help for commands.
  topic: Onbot control room — say !help for the available commands.

  # ## admin_user_ids - Administrators allowed to command the bot ###
  # YAML-path:   admin_room.admin_user_ids
  # Type:        List of str
  # Required:    False
  # Env-var:     'ONBOT_ADMIN_ROOM__ADMIN_USER_IDS'
  # Description: Full Matrix IDs permitted to run commands in the control room, listed by hand.
  #              These are added to whatever `authentik_group_pks_granting_bot_admin` resolves to, and
  #              this list is the right home for accounts Authentik has never heard of — a break-glass
  #              admin, another bot. It is also the floor the bot falls back on: it needs no Authentik
  #              call, so these administrators keep their commands when Authentik is unreachable.
  #              Everyone not in the union of the two lists is refused, even if they are somehow in the
  #              room and even if they hold a high power level there, because a command like
  #              `!announce` reaches every user on the server. The bot invites these users to the room
  #              when it creates it, and re-checks on every reconcile, so somebody added here or to the
  #              group later is invited without a restart.
  # Example:
  #  >admin_user_ids:
  #  >- '@admin:company.org'
  #  >- '@ops-lead:company.org'
  admin_user_ids: []

  # ## authentik_group_pks_granting_bot_admin - Authentik groups whose members may command the bot ###
  # YAML-path:   admin_room.authentik_group_pks_granting_bot_admin
  # Type:        List of str
  # Required:    False
  # Env-var:     'ONBOT_ADMIN_ROOM__AUTHENTIK_GROUP_PKS_GRANTING_BOT_ADMIN'
  # Description: Primary keys (`pk`) of Authentik groups whose members may run commands in the
  #              control room, so the allowlist can be maintained where the rest of your access
  #              control already lives. Members are mapped to Matrix IDs with the same
  #              `authentik_username_mapping_attribute` the reconciler uses, and the result is unioned
  #              with `admin_user_ids`. Inactive users, users on `authentik_user_ignore_list`, and
  #              users the bot cannot map to a Matrix ID are never granted anything. Membership is
  #              re-read periodically, so removing somebody from the group revokes their commands
  #              without restarting the bot.
  #
  #              Authentik *superusers* are deliberately not admins of this bot, and there is no
  #              option to make them so: people are made superusers to administer an identity
  #              provider, not to page the whole company, and a capability that reaches every user on
  #              the server must not widen silently because somebody was granted an unrelated role
  #              upstream. Create a group, put people in it, and name it here. An empty list, together
  #              with an empty `admin_user_ids`, means nobody may command the bot.
  # Example:
  #  >authentik_group_pks_granting_bot_admin:
  #  >- 1120a6e1124f309bbe96c8be5fb09eab
  authentik_group_pks_granting_bot_admin: []

# ## place_onboarding_rooms_in_space - Put welcome rooms in the space ###
# Type:        bool
# Required:    False
# Default:     false
# Env-var:     'ONBOT_PLACE_ONBOARDING_ROOMS_IN_SPACE'
# Description: Gather the 1:1 onboarding/welcome rooms under the managed parent space as well. Off
#              by default — whether direct rooms belong in a space is a matter of taste. Only applies
#              when `create_matrix_rooms_in_a_matrix_space` is enabled.
place_onboarding_rooms_in_space: false

# ## sync_authentik_users_with_matrix_rooms - User synchronisation ###
# Type:        Object (SyncAuthentikUsersWithMatrix)
# Required:    False
# Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS'
# Description: The core Authentik-to-Matrix sync: which users are considered, how they map onto
#              Matrix IDs, and what happens when they are disabled upstream.
sync_authentik_users_with_matrix_rooms:

  # ## enabled - Enable user synchronisation ###
  # YAML-path:   sync_authentik_users_with_matrix_rooms.enabled
  # Type:        bool
  # Required:    False
  # Default:     true
  # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__ENABLED'
  # Description: Master switch for projecting Authentik group membership into Matrix rooms.
  enabled: true

  # ## authentik_username_mapping_attribute - Attribute holding the Matrix localpart ###
  # YAML-path:   sync_authentik_users_with_matrix_rooms.authentik_username_mapping_attribute
  # Type:        str
  # Required:    False
  # Default:     "username"
  # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__AUTHENTIK_USERNAME_MAPPING_ATTRIBUTE'
  # Description: Source of the localpart of the Matrix ID (`@<localpart>:server`). A dotted path
  #              into the Authentik user object, e.g. `username` or `attributes.matrix_name`. On a
  #              homeserver fronted by the Matrix Authentication Service this MUST agree with the
  #              localpart template MAS derives from the upstream claim, or provisioned users will
  #              never match the accounts they own.
  # Example No. 1:
  #  >authentik_username_mapping_attribute: username
  # Example No. 2:
  #  >authentik_username_mapping_attribute: attributes.matrix_name
  authentik_username_mapping_attribute: username

  # ## kick_matrix_room_members_not_in_mapped_authentik_group_anymore - Kick members who left the Authentik group ###
  # YAML-path:   sync_authentik_users_with_matrix_rooms.kick_matrix_room_members_not_in_mapped_authentik_group_anymore
  # Type:        bool
  # Required:    False
  # Default:     true
  # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__KICK_MATRIX_ROOM_MEMBERS_NOT_IN_MAPPED_AUTHENTIK_GROUP_ANYMORE'
  # Description: When a user leaves an Authentik group, kick them from the corresponding Matrix
  #              room so membership stays a faithful mirror. Disable to let the bot only ever *add*
  #              members and never remove them — users then keep access to rooms after losing the
  #              group that granted it.
  kick_matrix_room_members_not_in_mapped_authentik_group_anymore: true

  # ## sync_only_users_in_authentik_pathes - Filter: Authentik directory paths ###
  # YAML-path:   sync_authentik_users_with_matrix_rooms.sync_only_users_in_authentik_pathes
  # Type:        List of str
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__SYNC_ONLY_USERS_IN_AUTHENTIK_PATHES'
  # Description: Only sync users that live under one of these Authentik directory paths. Paths are
  #              matched exactly, so a parent path does not imply its children — list both if you want
  #              both. `null` syncs users regardless of path.
  # Example:
  #  >sync_only_users_in_authentik_pathes:
  #  >- users
  #  >- users/staff
  sync_only_users_in_authentik_pathes:

  # ## sync_only_users_with_authentik_attributes - Filter: Authentik user attributes ###
  # YAML-path:   sync_authentik_users_with_matrix_rooms.sync_only_users_with_authentik_attributes
  # Type:        Dictionary of (str)
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__SYNC_ONLY_USERS_WITH_AUTHENTIK_ATTRIBUTES'
  # Description: Only sync users carrying all of these custom Authentik attributes, compared by
  #              exact value. A convenient way to let users opt into chat. `null` syncs every user.
  #              See https://docs.goauthentik.io/docs/users-sources/user/user_ref#attributes
  # Example:
  #  >sync_only_users_with_authentik_attributes:
  #  >  is_chat_user: true
  sync_only_users_with_authentik_attributes:

  # ## sync_only_users_of_groups_with_id - Filter: Authentik group membership ###
  # YAML-path:   sync_authentik_users_with_matrix_rooms.sync_only_users_of_groups_with_id
  # Type:        List of str
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__SYNC_ONLY_USERS_OF_GROUPS_WITH_ID'
  # Description: Only sync users who belong to at least one of these Authentik groups, identified by
  #              the group's primary key (`pk`). `null` applies no group filter. Note this filters
  #              *which users exist* for the bot; it does not by itself decide which groups become
  #              rooms — that is `sync_matrix_rooms_based_on_authentik_groups`.
  # Example:
  #  >sync_only_users_of_groups_with_id:
  #  >- 1120a6e1124f309bbe96c8be5fb09eab
  sync_only_users_of_groups_with_id:

  # ## deactivate_disabled_authentik_users_in_matrix - Offboarding: lock out users disabled upstream ###
  # YAML-path:   sync_authentik_users_with_matrix_rooms.deactivate_disabled_authentik_users_in_matrix
  # Type:        Object (DeactivateDisabledAuthentikUsersInMatrix)
  # Required:    False
  # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__DEACTIVATE_DISABLED_AUTHENTIK_USERS_IN_MATRIX'
  # Description: What happens to a Matrix account once its Authentik account is disabled or
  #              deleted. Defaults to an audit-only dry run — see the `dry_run` field below.
  deactivate_disabled_authentik_users_in_matrix:

    # ## enabled - Enable offboarding ###
    # YAML-path:   sync_authentik_users_with_matrix_rooms.deactivate_disabled_authentik_users_in_matrix.enabled
    # Type:        bool
    # Required:    False
    # Default:     true
    # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__DEACTIVATE_DISABLED_AUTHENTIK_USERS_IN_MATRIX__ENABLED'
    # Description: Lock out Matrix accounts whose Authentik account was disabled or deleted. With
    #              `dry_run` left at its default this only produces an audit trail; see `dry_run` before
    #              turning this into a destructive action.
    enabled: true

    # ## dry_run - Dry run (audit only) ###
    # YAML-path:   sync_authentik_users_with_matrix_rooms.deactivate_disabled_authentik_users_in_matrix.dry_run
    # Type:        bool
    # Required:    False
    # Default:     true
    # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__DEACTIVATE_DISABLED_AUTHENTIK_USERS_IN_MATRIX__DRY_RUN'
    # Description: Quarantine switch. While `true` the bot only records bookkeeping and logs what it
    #              *would* do to the `onbot.lifecycle.audit` channel — no session is revoked and no
    #              account is deactivated or deleted. Set `false` to actually perform destructive
    #              lifecycle actions. Defaults to `true` so destructive offboarding is always opt-in;
    #              run with the default first and read the audit log before switching it off.
    dry_run: true

    # ## deactivate_after_n_sec - Grace period before deactivation ###
    # YAML-path:   sync_authentik_users_with_matrix_rooms.deactivate_disabled_authentik_users_in_matrix.deactivate_after_n_sec
    # Type:        int
    # Required:    False
    # Default:     86400
    # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__DEACTIVATE_DISABLED_AUTHENTIK_USERS_IN_MATRIX__DEACTIVATE_AFTER_N_SEC'
    # Description: Seconds a user must stay disabled in Authentik before their Matrix account is
    #              deactivated. Absorbs accidental upstream disables: re-enabling the Authentik account
    #              within this window cancels the pending deactivation. The default is 24 hours.
    # Example No. 1:
    #  >deactivate_after_n_sec: 86400
    # Example No. 2:
    #  >deactivate_after_n_sec: 3600
    deactivate_after_n_sec: 86400

    # ## delete_after_n_sec - Grace period before deletion ###
    # YAML-path:   sync_authentik_users_with_matrix_rooms.deactivate_disabled_authentik_users_in_matrix.delete_after_n_sec
    # Type:        int
    # Required:    False
    # Default:     31536000
    # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__DEACTIVATE_DISABLED_AUTHENTIK_USERS_IN_MATRIX__DELETE_AFTER_N_SEC'
    # Description: Seconds a user must stay disabled in Authentik before their Matrix account is
    #              erased, counted from the same point as `deactivate_after_n_sec` (so it should be the
    #              larger of the two). `null` disables deletion entirely and leaves accounts
    #              deactivated. The default is 365 days.
    # Example No. 1:
    #  >delete_after_n_sec: 31536000
    # Example No. 2:
    #  >delete_after_n_sec: null
    delete_after_n_sec: 31536000

    # ## include_user_media_on_delete - Delete user media on deletion ###
    # YAML-path:   sync_authentik_users_with_matrix_rooms.deactivate_disabled_authentik_users_in_matrix.include_user_media_on_delete
    # Type:        bool
    # Required:    False
    # Default:     false
    # Env-var:     'ONBOT_SYNC_AUTHENTIK_USERS_WITH_MATRIX_ROOMS__DEACTIVATE_DISABLED_AUTHENTIK_USERS_IN_MATRIX__INCLUDE_USER_MEDIA_ON_DELETE'
    # Description: Also delete media the user uploaded when their account is erased. Useful to honour
    #              data-protection requests, but the media is unrecoverable and may still be referenced
    #              by messages in rooms the user posted in.
    include_user_media_on_delete: false

# ## create_matrix_rooms_in_a_matrix_space - Parent space ###
# Type:        Object (CreateMatrixRoomsInAMatrixSpace)
# Required:    False
# Env-var:     'ONBOT_CREATE_MATRIX_ROOMS_IN_A_MATRIX_SPACE'
# Description: The designated parent space that collects the Authentik-group rooms.
create_matrix_rooms_in_a_matrix_space:

  # ## enabled - Group rooms into a space ###
  # YAML-path:   create_matrix_rooms_in_a_matrix_space.enabled
  # Type:        bool
  # Required:    False
  # Default:     true
  # Env-var:     'ONBOT_CREATE_MATRIX_ROOMS_IN_A_MATRIX_SPACE__ENABLED'
  # Description: Gather all Authentik-group rooms under a dedicated parent space. Disable to leave
  #              the rooms unparented at the top of the user's room list.
  enabled: true

  # ## alias - Space alias localpart ###
  # YAML-path:   create_matrix_rooms_in_a_matrix_space.alias
  # Type:        str
  # Required:    False
  # Default:     "OnBotSpace"
  # Env-var:     'ONBOT_CREATE_MATRIX_ROOMS_IN_A_MATRIX_SPACE__ALIAS'
  # Description: Localpart of the space's canonical alias, i.e. the `<alias>` in
  #              `#<alias>:<server_name>`. This is how the bot finds an existing space, so changing it
  #              later makes the bot create a second, empty space rather than rename the first.
  # Example No. 1:
  #  >alias: myspace
  # Example No. 2:
  #  >alias: companyspace
  alias: OnBotSpace

  # ## create_matrix_space_if_not_exists - Space creation ###
  # YAML-path:   create_matrix_rooms_in_a_matrix_space.create_matrix_space_if_not_exists
  # Type:        Object (CreateMatrixSpaceIfNotExists)
  # Required:    False
  # Env-var:     'ONBOT_CREATE_MATRIX_ROOMS_IN_A_MATRIX_SPACE__CREATE_MATRIX_SPACE_IF_NOT_EXISTS'
  # Description: Whether and how the parent space is created when it does not exist yet.
  create_matrix_space_if_not_exists:

    # ## enabled - Create the space if missing ###
    # YAML-path:   create_matrix_rooms_in_a_matrix_space.create_matrix_space_if_not_exists.enabled
    # Type:        bool
    # Required:    False
    # Default:     true
    # Env-var:     'ONBOT_CREATE_MATRIX_ROOMS_IN_A_MATRIX_SPACE__CREATE_MATRIX_SPACE_IF_NOT_EXISTS__ENABLED'
    # Description: Create the parent space when no space with the configured alias exists. Disable if
    #              you want to create and curate the space yourself; the bot then only adds rooms to
    #              it.
    enabled: true

    # ## name - Space display name ###
    # YAML-path:   create_matrix_rooms_in_a_matrix_space.create_matrix_space_if_not_exists.name
    # Type:        str
    # Required:    False
    # Default:     "OnBotSpace"
    # Env-var:     'ONBOT_CREATE_MATRIX_ROOMS_IN_A_MATRIX_SPACE__CREATE_MATRIX_SPACE_IF_NOT_EXISTS__NAME'
    # Description: Display name of the space, as shown in the client's room list.
    # Example No. 1:
    #  >name: Company Chat
    # Example No. 2:
    #  >name: OnBotSpace
    name: OnBotSpace

    # ## topic - Space topic ###
    # YAML-path:   create_matrix_rooms_in_a_matrix_space.create_matrix_space_if_not_exists.topic
    # Type:        str
    # Required:    False
    # Default:     "Space for authentik group rooms"
    # Env-var:     'ONBOT_CREATE_MATRIX_ROOMS_IN_A_MATRIX_SPACE__CREATE_MATRIX_SPACE_IF_NOT_EXISTS__TOPIC'
    # Description: Matrix topic (tagline) for the space.
    # Example:
    #  >topic: Space for authentik group rooms
    topic: Space for authentik group rooms

    # ## avatar_url - Space avatar ###
    # YAML-path:   create_matrix_rooms_in_a_matrix_space.create_matrix_space_if_not_exists.avatar_url
    # Type:        str
    # Required:    False
    # Default:     null
    # Env-var:     'ONBOT_CREATE_MATRIX_ROOMS_IN_A_MATRIX_SPACE__CREATE_MATRIX_SPACE_IF_NOT_EXISTS__AVATAR_URL'
    # Description: HTTP(S) URL to a picture used as the space avatar (icon). The image is downloaded
    #              and re-uploaded to the homeserver's media repository on every reconcile, but only
    #              when the URL changed — so this also updates an already existing space. `null` leaves
    #              the space without an avatar.
    # Example:
    #  >avatar_url: https://sillyimages.com/space.png
    avatar_url:

    # ## space_params - Space creation parameters ###
    # YAML-path:   create_matrix_rooms_in_a_matrix_space.create_matrix_space_if_not_exists.space_params
    # Type:        Dictionary of (str)
    # Required:    False
    # Env-var:     'ONBOT_CREATE_MATRIX_ROOMS_IN_A_MATRIX_SPACE__CREATE_MATRIX_SPACE_IF_NOT_EXISTS__SPACE_PARAMS'
    # Description: Extra parameters merged into the Matrix `POST /createRoom` call that creates the
    #              space. Only read when the space is actually created; changing them later does not
    #              rewrite an existing space. See the Client-Server API `POST /createRoom`.
    # Example:
    #  >space_params:
    #  >  preset: private_chat
    #  >  visibility: private
    space_params:

      # ## preset ###
      # YAML-path: create_matrix_rooms_in_a_matrix_space.create_matrix_space_if_not_exists.space_params.['preset']
      # Required:  True
      # Env-var:   'ONBOT_CREATE_MATRIX_ROOMS_IN_A_MATRIX_SPACE__CREATE_MATRIX_SPACE_IF_NOT_EXISTS__SPACE_PARAMS__<dict-key>'
      preset: private_chat

      # ## visibility ###
      # YAML-path: create_matrix_rooms_in_a_matrix_space.create_matrix_space_if_not_exists.space_params.['visibility']
      # Required:  True
      # Env-var:   'ONBOT_CREATE_MATRIX_ROOMS_IN_A_MATRIX_SPACE__CREATE_MATRIX_SPACE_IF_NOT_EXISTS__SPACE_PARAMS__<dict-key>'
      visibility: private

# ## sync_matrix_rooms_based_on_authentik_groups - Room synchronisation ###
# Type:        Object (SyncMatrixRoomsBasedOnAuthentikGroups)
# Required:    False
# Env-var:     'ONBOT_SYNC_MATRIX_ROOMS_BASED_ON_AUTHENTIK_GROUPS'
# Description: The group-to-room projection: which Authentik groups become Matrix rooms, what
#              happens when a group disappears, and how power levels are derived.
sync_matrix_rooms_based_on_authentik_groups:

  # ## enabled - Enable room synchronisation ###
  # YAML-path:   sync_matrix_rooms_based_on_authentik_groups.enabled
  # Type:        bool
  # Required:    False
  # Default:     true
  # Env-var:     'ONBOT_SYNC_MATRIX_ROOMS_BASED_ON_AUTHENTIK_GROUPS__ENABLED'
  # Description: Master switch for creating and maintaining one Matrix room per Authentik group.
  enabled: true

  # ## only_for_children_of_groups_with_uid - Filter: child groups of these parents ###
  # YAML-path:   sync_matrix_rooms_based_on_authentik_groups.only_for_children_of_groups_with_uid
  # Type:        List of str
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_SYNC_MATRIX_ROOMS_BASED_ON_AUTHENTIK_GROUPS__ONLY_FOR_CHILDREN_OF_GROUPS_WITH_UID'
  # Description: Only mirror Authentik groups that are direct children of one of these parent
  #              groups, identified by the parent's primary key (`pk`). Only the immediate children
  #              match, not grandchildren. `null` considers all groups.
  # Example:
  #  >only_for_children_of_groups_with_uid:
  #  >- a1b2c3d4parentgroupuid
  only_for_children_of_groups_with_uid:

  # ## only_groups_with_attributes - Filter: Authentik group attributes ###
  # YAML-path:   sync_matrix_rooms_based_on_authentik_groups.only_groups_with_attributes
  # Type:        Dictionary of (str)
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_SYNC_MATRIX_ROOMS_BASED_ON_AUTHENTIK_GROUPS__ONLY_GROUPS_WITH_ATTRIBUTES'
  # Description: Only mirror Authentik groups carrying all of these custom attributes, compared by
  #              exact value. A convenient way to opt a group into chat. `null` turns every group into
  #              a room. See https://goauthentik.io/docs/user-group/group#attributes
  # Example:
  #  >only_groups_with_attributes:
  #  >  is_chatroom: true
  only_groups_with_attributes:

  # ## room_avatar_url_attribute - Group attribute holding the room avatar URL ###
  # YAML-path:   sync_matrix_rooms_based_on_authentik_groups.room_avatar_url_attribute
  # Type:        str
  # Required:    False
  # Default:     "chatroom_avatar_url"
  # Env-var:     'ONBOT_SYNC_MATRIX_ROOMS_BASED_ON_AUTHENTIK_GROUPS__ROOM_AVATAR_URL_ATTRIBUTE'
  # Description: Key inside an Authentik group's custom `attributes` holding an HTTP(S) URL used as
  #              that group's room avatar (icon). The image is downloaded and re-uploaded to the
  #              homeserver's media repository on every reconcile, but only when the URL changed.
  #              `null` disables per-room avatars.
  # Example:
  #  >room_avatar_url_attribute: chatroom_avatar_url
  room_avatar_url_attribute: chatroom_avatar_url

  # ## only_for_groupnames_starting_with - Filter: group name prefix ###
  # YAML-path:   sync_matrix_rooms_based_on_authentik_groups.only_for_groupnames_starting_with
  # Type:        str
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_SYNC_MATRIX_ROOMS_BASED_ON_AUTHENTIK_GROUPS__ONLY_FOR_GROUPNAMES_STARTING_WITH'
  # Description: Only mirror Authentik groups whose name starts with this prefix — a lightweight way
  #              to opt specific groups into chat without custom attributes. The prefix stays part of
  #              the group name and therefore of the room name unless you override the name template.
  #              `null` disables the filter.
  # Example No. 1:
  #  >only_for_groupnames_starting_with: chat-
  # Example No. 2:
  #  >only_for_groupnames_starting_with: matrix_
  only_for_groupnames_starting_with:

  # ## disable_rooms_when_mapped_authentik_group_disappears - Disable orphaned rooms ###
  # YAML-path:   sync_matrix_rooms_based_on_authentik_groups.disable_rooms_when_mapped_authentik_group_disappears
  # Type:        bool
  # Required:    False
  # Default:     false
  # Env-var:     'ONBOT_SYNC_MATRIX_ROOMS_BASED_ON_AUTHENTIK_GROUPS__DISABLE_ROOMS_WHEN_MAPPED_AUTHENTIK_GROUP_DISAPPEARS'
  # Description: If a mapped Authentik group disappears — deleted, or it no longer passes the
  #              filters above — kick all members from the corresponding room and block it. Note that
  #              loosening a filter therefore re-enables nothing: the room stays blocked.
  disable_rooms_when_mapped_authentik_group_disappears: false

  # ## delete_disabled_rooms - Delete disabled rooms ###
  # YAML-path:   sync_matrix_rooms_based_on_authentik_groups.delete_disabled_rooms
  # Type:        bool
  # Required:    False
  # Default:     false
  # Env-var:     'ONBOT_SYNC_MATRIX_ROOMS_BASED_ON_AUTHENTIK_GROUPS__DELETE_DISABLED_ROOMS'
  # Description: When a room is disabled (see `disable_rooms_when_mapped_authentik_group_disappears`)
  #              also delete it through the Synapse admin API, rather than only blocking it. This
  #              destroys the room's history irreversibly — leave `false` unless you are sure.
  delete_disabled_rooms: false

  # ## make_authentik_superusers_matrix_room_admin - Authentik superusers become room admins ###
  # YAML-path:   sync_matrix_rooms_based_on_authentik_groups.make_authentik_superusers_matrix_room_admin
  # Type:        bool
  # Required:    False
  # Default:     true
  # Env-var:     'ONBOT_SYNC_MATRIX_ROOMS_BASED_ON_AUTHENTIK_GROUPS__MAKE_AUTHENTIK_SUPERUSERS_MATRIX_ROOM_ADMIN'
  # Description: Grant Authentik superusers the Matrix admin power level (100) in the rooms they are
  #              members of. Takes precedence over `authentik_group_attr_for_matrix_power_level`.
  make_authentik_superusers_matrix_room_admin: true

  # ## authentik_group_attr_for_matrix_power_level - Group attribute holding the Matrix power level ###
  # YAML-path:   sync_matrix_rooms_based_on_authentik_groups.authentik_group_attr_for_matrix_power_level
  # Type:        str
  # Required:    False
  # Default:     "chat-systemwide-powerlevel"
  # Env-var:     'ONBOT_SYNC_MATRIX_ROOMS_BASED_ON_AUTHENTIK_GROUPS__AUTHENTIK_GROUP_ATTR_FOR_MATRIX_POWER_LEVEL'
  # Description: Authentik group attribute (dotted path) holding an integer from 0 to 100. Members
  #              of that group receive the value as their Matrix power level in the rooms this bot
  #              manages. When a user's groups disagree, the highest value wins. Superusers promoted
  #              by `make_authentik_superusers_matrix_room_admin` ignore this attribute.
  # Example No. 1:
  #  >authentik_group_attr_for_matrix_power_level: matrix-userpowerlevel
  # Example No. 2:
  #  >authentik_group_attr_for_matrix_power_level: synapse-options.chat-powerlevel
  authentik_group_attr_for_matrix_power_level: chat-systemwide-powerlevel

# ## matrix_room_default_settings - Default room settings ###
# Type:        Object (MatrixDynamicRoomSettings)
# Required:    False
# Env-var:     'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS'
# Description: The room identity template applied to every group room: how its alias, name, topic
#              and creation parameters are derived from the Authentik group.
matrix_room_default_settings:

  # ## alias_prefix - Room alias prefix ###
  # YAML-path:   matrix_room_default_settings.alias_prefix
  # Type:        str
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__ALIAS_PREFIX'
  # Description: Prefix prepended to the room's canonical alias localpart, useful to keep bot-managed
  #              rooms in their own namespace. `null` for no prefix.
  # Example No. 1:
  #  >alias_prefix: authentik-
  # Example No. 2:
  #  >alias_prefix: grp-
  alias_prefix:

  # ## matrix_alias_from_authentik_attribute - Group attribute used as the room alias ###
  # YAML-path:   matrix_room_default_settings.matrix_alias_from_authentik_attribute
  # Type:        str
  # Required:    False
  # Default:     "pk"
  # Env-var:     'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__MATRIX_ALIAS_FROM_AUTHENTIK_ATTRIBUTE'
  # Description: Authentik group attribute (dotted path) used as the room's alias localpart. The
  #              default `pk` is the most stable choice, because it survives a group being renamed —
  #              an alias derived from the group name would not, and a Matrix alias cannot be changed
  #              once the room is created.
  # Example No. 1:
  #  >matrix_alias_from_authentik_attribute: pk
  # Example No. 2:
  #  >matrix_alias_from_authentik_attribute: attributes.chatroom_alias
  matrix_alias_from_authentik_attribute: pk

  # ## name_prefix - Room name prefix ###
  # YAML-path:   matrix_room_default_settings.name_prefix
  # Type:        str
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__NAME_PREFIX'
  # Description: Prefix prepended to the room's display name. `null` for no prefix.
  # Example:
  #  >name_prefix: '[Chat] '
  name_prefix:

  # ## matrix_name_from_authentik_attribute - Group attribute used as the room name ###
  # YAML-path:   matrix_room_default_settings.matrix_name_from_authentik_attribute
  # Type:        str
  # Required:    False
  # Default:     "name"
  # Env-var:     'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__MATRIX_NAME_FROM_AUTHENTIK_ATTRIBUTE'
  # Description: Authentik group attribute (dotted path) used as the room's display name.
  # Example No. 1:
  #  >matrix_name_from_authentik_attribute: name
  # Example No. 2:
  #  >matrix_name_from_authentik_attribute: attributes.chatroom_name
  matrix_name_from_authentik_attribute: name

  # ## topic_prefix - Room topic prefix ###
  # YAML-path:   matrix_room_default_settings.topic_prefix
  # Type:        str
  # Required:    False
  # Default:     null
  # Env-var:     'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__TOPIC_PREFIX'
  # Description: Prefix prepended to the room's topic. `null` for no prefix.
  # Example:
  #  >topic_prefix: "Group chat \u2014 "
  topic_prefix:

  # ## matrix_topic_from_authentik_attribute - Group attribute used as the room topic ###
  # YAML-path:   matrix_room_default_settings.matrix_topic_from_authentik_attribute
  # Type:        str
  # Required:    False
  # Default:     "attributes.chatroom_topic"
  # Env-var:     'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__MATRIX_TOPIC_FROM_AUTHENTIK_ATTRIBUTE'
  # Description: Authentik group attribute (dotted path) used as the room's topic. `null` leaves the
  #              topic unset.
  # Example:
  #  >matrix_topic_from_authentik_attribute: attributes.chatroom_topic
  matrix_topic_from_authentik_attribute: attributes.chatroom_topic

  # ## end2end_encryption_enabled - Enable end-to-end encryption ###
  # YAML-path:   matrix_room_default_settings.end2end_encryption_enabled
  # Type:        bool
  # Required:    False
  # Default:     true
  # Env-var:     'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__END2END_ENCRYPTION_ENABLED'
  # Description: Enable end-to-end encryption in the group-mapped Matrix rooms. The bot itself stays
  #              outside encryption: it writes room *state* (membership, power levels, name, topic),
  #              which is never encrypted, but it does not read or post message content in encrypted
  #              rooms. Welcome messages are sent in a separate, unencrypted direct room. Encryption
  #              cannot be turned off again for a room once it is on.
  end2end_encryption_enabled: true

  # ## default_room_create_params - Room creation parameters ###
  # YAML-path:   matrix_room_default_settings.default_room_create_params
  # Type:        Dictionary of (str)
  # Required:    False
  # Env-var:     'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__DEFAULT_ROOM_CREATE_PARAMS'
  # Description: Parameters merged into the Matrix `POST /createRoom` call for group rooms — preset,
  #              visibility, federation, and so on. Only read when a room is actually created; changing
  #              them later does not rewrite existing rooms. See the Client-Server API
  #              `POST /createRoom`.
  # Example:
  #  >default_room_create_params:
  #  >  preset: private_chat
  #  >  visibility: private
  default_room_create_params:

    # ## preset ###
    # YAML-path: matrix_room_default_settings.default_room_create_params.['preset']
    # Required:  True
    # Env-var:   'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__DEFAULT_ROOM_CREATE_PARAMS__<dict-key>'
    preset: private_chat

    # ## visibility ###
    # YAML-path: matrix_room_default_settings.default_room_create_params.['visibility']
    # Required:  True
    # Env-var:   'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__DEFAULT_ROOM_CREATE_PARAMS__<dict-key>'
    visibility: private

  # ## matrix_room_create_params_from_authentik_attribute - Group attribute holding extra creation parameters ###
  # YAML-path:   matrix_room_default_settings.matrix_room_create_params_from_authentik_attribute
  # Type:        str
  # Required:    False
  # Default:     "attributes.chatroom_params"
  # Env-var:     'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__MATRIX_ROOM_CREATE_PARAMS_FROM_AUTHENTIK_ATTRIBUTE'
  # Description: Authentik group attribute (dotted path) holding a mapping of extra `createRoom`
  #              parameters, merged over `default_room_create_params` for that group. `null` disables
  #              per-group overrides.
  # Example:
  #  >matrix_room_create_params_from_authentik_attribute: attributes.chatroom_params
  matrix_room_create_params_from_authentik_attribute: attributes.chatroom_params

  # ## keep_updating_matrix_attributes_from_authentik - Keep room name and topic in sync ###
  # YAML-path:   matrix_room_default_settings.keep_updating_matrix_attributes_from_authentik
  # Type:        bool
  # Required:    False
  # Default:     true
  # Env-var:     'ONBOT_MATRIX_ROOM_DEFAULT_SETTINGS__KEEP_UPDATING_MATRIX_ATTRIBUTES_FROM_AUTHENTIK'
  # Description: Re-apply the room's name and topic from Authentik on every reconcile, overwriting
  #              any drift. Disable to let room admins rename rooms in their client and keep the
  #              change.
  keep_updating_matrix_attributes_from_authentik: true

# ## per_authentik_group_pk_matrix_room_settings - Per-group room setting overrides ###
# Type:        Dictionary of (str, Object (MatrixDynamicRoomSettings))
# Required:    False
# Env-var:     'ONBOT_PER_AUTHENTIK_GROUP_PK_MATRIX_ROOM_SETTINGS'
# Description: Overrides for `matrix_room_default_settings`, keyed by the Authentik group's primary
#              key (`pk`). Only the keys you list are overridden; the rest fall back to the defaults.
#              Use this to give a single group a different name prefix, or to leave one room
#              unencrypted.
# Example:
#  >per_authentik_group_pk_matrix_room_settings:
#  >  1120a6e1124f309bbe96c8be5fb09eab:
#  >    name_prefix: '[Public] '
#  >    end2end_encryption_enabled: false
per_authentik_group_pk_matrix_room_settings: {}

# ## matrix_user_ignore_list - Ignored Matrix users ###
# Type:        List of str
# Required:    False
# Env-var:     'ONBOT_MATRIX_USER_IGNORE_LIST'
# Description: Full Matrix IDs the bot never touches: it will not onboard them, invite them,
#              change their power level, kick them from a room, or deactivate them. Use it to protect
#              accounts that exist only in Matrix — server admins, other bots, bridge users — from a
#              sync that would otherwise see them as unknown to Authentik. The bot's own
#              `synapse_server.bot_user_id` is always ignored and need not be listed.
# Example:
#  >matrix_user_ignore_list:
#  >- '@admin:company.org'
#  >- '@root:company.org'
matrix_user_ignore_list: []

# ## authentik_user_ignore_list - Ignored Authentik users ###
# Type:        List of str
# Required:    False
# Env-var:     'ONBOT_AUTHENTIK_USER_IGNORE_LIST'
# Description: Authentik usernames the bot never syncs into Matrix. Matched against the raw
#              `username` field, not against `authentik_username_mapping_attribute`. Use it to keep
#              service and break-glass accounts out of chat.
# Example:
#  >authentik_user_ignore_list:
#  >- admin
#  >- internal_account_alex
authentik_user_ignore_list: []

# ## authentik_group_id_ignore_list - Ignored Authentik groups ###
# Type:        List of str
# Required:    False
# Env-var:     'ONBOT_AUTHENTIK_GROUP_ID_IGNORE_LIST'
# Description: Authentik groups that never become a Matrix room, identified by the group's primary
#              key (`pk`). Applied before every other group filter, so a listed group is skipped even
#              if it carries the attributes or name prefix that would otherwise select it.
# Example:
#  >authentik_group_id_ignore_list:
#  >- 1120a6e1124f309bbe96c8be5fb09eab
authentik_group_id_ignore_list: []
