# Authentik blueprint: register an OAuth2/OIDC provider + application that MAS uses as its
# upstream IdP (ADR-0006). Discovered and applied automatically by the Authentik worker.
#
# The default `profile` scope mapping exposes `preferred_username = request.user.username`, so the
# OIDC `preferred_username` claim equals the Authentik username. MAS imports that as the Matrix
# localpart (see mas/config.yaml claims_imports), which is exactly what onbot's identity mapping
# assumes (authentik_username_mapping_attribute = "username"). The integration suite asserts this
# contract end-to-end.
version: 1
metadata:
  name: onbot-mas-upstream
entries:
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    id: onbot-mas-provider
    identifiers:
      name: onbot-mas
    attrs:
      name: onbot-mas
      client_type: confidential
      client_id: mas-upstream-client-id
      client_secret: mas-upstream-client-secret
      # MAS drives the authorization-code flow with refresh (offline_access scope).
      grant_types:
        - authorization_code
        - refresh_token
      # MAS builds the callback from its public_base; match any path under the MAS host (test IdP).
      redirect_uris:
        - matching_mode: regex
          url: "http://mas:8080/.*"
      # Implicit-consent authorization flow skips the consent screen so first login is headless.
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      # Sign id_tokens with the auto-generated self-signed key so MAS can verify via JWKS.
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      issuer_mode: per_provider
      sub_mode: user_username
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]
  - model: authentik_core.application
    state: present
    identifiers:
      slug: mas
    attrs:
      name: onbot-mas
      slug: mas
      provider: !KeyOf onbot-mas-provider
