matrix:
  homeserver: "onbot.test"
  secret: "fdaec979e563f67d6941b8263248e495ae49c7be7e59d2d4ecda601a830f4ed5"
  endpoint: "http://synapse:8008"

clients:
  # The homeserver itself — Synapse introspects tokens against MAS using these credentials.
  - client_id: "0000000000000000000SYNAPSE"
    client_auth_method: client_secret_basic
    client_secret: "7ad6a9abfd83a14c730e376e7e2627424194aef6212e8cc07328199ed708aebd"
  # The integration test's OIDC client — drives a real authorization-code login to provision a user.
  - client_id: "0000000000000000000000TEST"
    client_auth_method: client_secret_post
    client_secret: "557eddece563d23e6d6effec55b10f331f02faddb108208d427b389d3aa2e47f"
    redirect_uris:
      - "http://localhost:9999/callback"
  # The bot's MAS-admin client (client_credentials -> urn:mas:admin). Onbot's lifecycle module
  # uses this to revoke MAS sessions / deactivate users — the Synapse admin API cannot (§7 Q1).
  - client_id: "0000000000000000000MASADMN"
    client_auth_method: client_secret_basic
    client_secret: "04ca2b8aa47c1d270cd6fa3d72f5e8750ca5e66cb57a6783ccb01be6fffa483b"

# Allow the bot's admin client to obtain the urn:mas:admin scope via client_credentials.
policy:
  data:
    admin_clients:
      - "0000000000000000000MASADMN"

upstream_oauth2:
  providers:
    - id: "01HFS67GJ145HCM9ZASYS9DC3J"
      human_name: "Authentik"
      issuer: "http://authentik-server:9000/application/o/mas/"
      client_id: "mas-upstream-client-id"
      client_secret: "mas-upstream-client-secret"
      token_endpoint_auth_method: client_secret_post
      scope: "openid profile email"
      discovery_mode: insecure
      pkce_method: auto
      # All imports non-interactive (force/ignore) so first login provisions headlessly with no
      # "complete your registration" browser form (ADR-0006: MAS auto-provisions on first login).
      claims_imports:
        subject:
          template: "{{ user.sub }}"
        localpart:
          action: force
          template: "{{ user.preferred_username }}"
        displayname:
          action: force
          template: "{{ user.preferred_username }}"
        email:
          action: ignore

account:
  password_registration_enabled: false

# Local passwords disabled: the only login method is the single Authentik upstream, so MAS skips its
# login selector and redirects straight to Authentik (keeps the test login flow headless).
passwords:
  enabled: false
