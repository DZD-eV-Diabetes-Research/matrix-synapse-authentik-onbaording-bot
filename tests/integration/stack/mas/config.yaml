# Matrix Authentication Service config for the Phase 7b integration stack (ADR-0006).
# Test-only secrets — this whole directory is a throwaway, hermetic stack, never a real deployment.
#
# Topology: Matrix client -> MAS -> Authentik (upstream IdP). public_base/issuer use the in-network
# service name `mas:8080` so Synapse (container) and the upstream callback agree on one issuer
# string; the host-side test login helper rewrites `mas:8080`/`authentik-server:9000` to localhost.

http:
  public_base: "http://mas:8080/"
  issuer: "http://mas:8080/"
  listeners:
    - name: web
      resources:
        - name: discovery
        - name: human
        - name: oauth
        - name: compat
        - name: assets
        - name: adminapi
      binds:
        - host: 0.0.0.0
          port: 8080

